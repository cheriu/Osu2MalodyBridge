name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.14.2'

      - name: Determine version
        id: version
        shell: bash
        run: |
          RAW=$(grep '^version =' build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            RAW="${GITHUB_REF#refs/tags/v}"
          fi
          PKG_VER="${RAW%%-*}"
          echo "pkg=$PKG_VER" >> $GITHUB_OUTPUT
          echo "version: $RAW (package: $PKG_VER)"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/package.sh
        env:
          APP_VERSION: ${{ steps.version.outputs.pkg }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package.ps1 -AppVersion "$env:PKG_VERSION"
        env:
          PKG_VERSION: ${{ steps.version.outputs.pkg }}

      - name: Create archive
        id: archive
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)  OS_NAME="linux" ;;
            Windows) OS_NAME="windows" ;;
            *)      OS_NAME="unknown" ;;
          esac
          ARCHIVE="MalodyStore-${OS_NAME}-x64.zip"
          cd build/dist
          zip -r "$ARCHIVE" MalodyStore/
          echo "archive=$ARCHIVE" >> $GITHUB_OUTPUT
          echo "  Created: $ARCHIVE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MalodyStore-${{ runner.os }}-${{ runner.arch }}
          path: build/dist/${{ steps.archive.outputs.archive }}

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: artifacts/**/*.zip
