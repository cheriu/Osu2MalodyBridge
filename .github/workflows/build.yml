name: Build and Package

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          # Read version from build.gradle.kts as fallback
          RAW=$(grep '^version =' build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            RAW="${GITHUB_REF#refs/tags/v}"
          fi
          # Strip -SNAPSHOT suffix (Windows jpackage requires plain digit versions)
          PKG_VER="${RAW%%-*}"
          echo "raw=$RAW" >> $GITHUB_OUTPUT
          echo "pkg=$PKG_VER" >> $GITHUB_OUTPUT
          echo "version: $RAW (package: $PKG_VER)"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/package.sh
        env:
          APP_VERSION: ${{ steps.version.outputs.pkg }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package.ps1 -AppVersion "$env:PKG_VERSION"
        env:
          PKG_VERSION: ${{ steps.version.outputs.pkg }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MalodyStore-${{ runner.os }}-${{ runner.arch }}
          path: build/dist/MalodyStore/
